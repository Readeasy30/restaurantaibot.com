<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestaurantAIBot | Ask AI. Find Food. Anywhere on Earth.</title>
  <meta name="description" content="RestaurantAIBot helps people find restaurants anywhere on Earth using AI-powered food search, Google Maps, and live restaurant recommendations." />
  <link rel="canonical" href="https://restaurantaibot.com/" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      background: #f5f7fb;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      width: 36%;
      max-width: 520px;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-right: 1px solid #ddd;
      z-index: 10;
    }

    .brand-header {
      padding: 24px;
      border-bottom: 1px solid #eee;
      background: linear-gradient(135deg,#ff6b35,#ff9559);
      color: white;
    }

    .brand-header h1 {
      font-size: 1.7rem;
      margin-bottom: 10px;
    }

    .brand-header h2 {
      font-size: 1.1rem;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .brand-header p {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .near-me-btn {
      margin-top: 14px;
      border: none;
      background: white;
      color: #ff6b35;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      width: fit-content;
    }

    .chat-history {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f5f7fb;
    }

    .message {
      max-width: 92%;
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .user-msg {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
    }

    .ai-msg {
      align-self: flex-start;
      background: #fff;
      color: #222;
      border: 1px solid #ddd;
    }

    .restaurant-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    .restaurant-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .restaurant-content {
      padding: 15px;
    }

    .restaurant-card h3 {
      margin-bottom: 8px;
    }

    .restaurant-card p {
      margin-bottom: 6px;
      color: #555;
      font-size: 0.92rem;
    }

    .tag {
      display: inline-block;
      background: #fff3ed;
      color: #ff6b35;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-top: 6px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .card-actions a {
      text-decoration: none;
      background: #ff6b35;
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .input-container {
      padding: 15px;
      display: flex;
      gap: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 999px;
      padding: 13px 15px;
      font-size: 1rem;
      outline: none;
    }

    .send-btn {
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #map-container {
      flex: 1;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="brand-header">
        <h1>🍕 RestaurantAIBot</h1>
        <h2>Ask AI. Find Food. Anywhere on Earth.</h2>
        <p>Search restaurants by craving, mood, city, budget, or vibe.</p>

        <button class="near-me-btn" id="nearMeBtn">📍 Use My Location</button>
      </div>

      <div class="chat-history" id="chatHistory">
        <div class="message ai-msg">
          Try “pizza near me” or “best sushi in Tokyo.”
        </div>
      </div>

      <div class="input-container">
        <input type="text" class="chat-input" id="userInput" placeholder="Search food + city..." />
        <button class="send-btn" id="sendBtn">Search</button>
      </div>
    </aside>

    <main id="map-container"></main>
  </div>

  <script src="/quick-searches.js"></script>

  <script>
    let map;
    let markers = [];
    let userLat = null;
    let userLng = null;

    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const nearMeBtn = document.getElementById('nearMeBtn');

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = text;
      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
      return div;
    }

    function addRestaurantCard(restaurant) {
      const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(restaurant.name + ' ' + restaurant.address)}`;

      const card = document.createElement('div');
      card.className = 'restaurant-card';

      card.innerHTML = `
        <img class="restaurant-image" src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200&auto=format&fit=crop" alt="Restaurant">

        <div class="restaurant-content">
          <h3>${restaurant.name}</h3>
          <p>⭐ ${restaurant.rating}</p>
          <p>${restaurant.address}</p>
          <span class="tag">AI Recommended</span>

          <div class="card-actions">
            <a href="${mapsLink}" target="_blank">Directions</a>
          </div>
        </div>
      `;

      chatHistory.appendChild(card);
    }

    function clearMarkers() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById('map-container'), {
        center: { lat: 39.8283, lng: -98.5795 },
        zoom: 4
      });
    }

    async function loadGoogleMaps() {
      const response = await fetch('/api/config');
      const config = await response.json();

      window.initMap = initMap;

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsApiKey}&callback=initMap`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }

    function requestLocation() {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;

          addMessage('📍 Location enabled. You can now search near you.', 'ai-msg');

          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(12);
        },
        () => {
          addMessage('Location access denied.', 'ai-msg');
        }
      );
    }

    async function handleSearch() {
      const query = userInput.value.trim();
      if (!query) return;

      addMessage(query, 'user-msg');

      const loading = addMessage('Searching restaurants...', 'ai-msg');

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: query,
            lat: userLat,
            lng: userLng
          })
        });

        const data = await response.json();

        loading.remove();

        addMessage(data.aiExplanation, 'ai-msg');

        clearMarkers();

        const bounds = new google.maps.LatLngBounds();

        data.restaurants.forEach((restaurant) => {
          addRestaurantCard(restaurant);

          const marker = new google.maps.Marker({
            position: {
              lat: restaurant.lat,
              lng: restaurant.lng
            },
            map,
            title: restaurant.name
          });

          markers.push(marker);
          bounds.extend(marker.position);
        });

        if (markers.length > 0) {
          map.fitBounds(bounds);
        }

      } catch (error) {
        loading.remove();
        addMessage('Search failed.', 'ai-msg');
      }
    }

    nearMeBtn.addEventListener('click', requestLocation);
    sendBtn.addEventListener('click', handleSearch);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        handleSearch();
      }
    });

    loadGoogleMaps();
  </script>
</body>
</html>
