<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant AI Bot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Restaurant AI Bot</p>
        <h1>Find a good place to eat fast.</h1>
        <p class="subtext">
          Search by craving, mood, and location — or let the bot pick dinner for you.
        </p>
      </div>
    </section>

    <section class="search-panel">
      <div class="field-group">
        <label for="food">What do you want?</label>
        <input
          id="food"
          type="text"
          placeholder="pizza, sushi, burgers, tacos..."
        />
      </div>

      <div class="field-group">
        <label for="location">Location</label>
        <input
          id="location"
          type="text"
          placeholder="city or ZIP"
        />
      </div>

      <div class="section-label">Quick picks</div>
      <div id="quickChips" class="chips">
        <button type="button" onclick="quickSearch('pizza')">🍕 Pizza</button>
        <button type="button" onclick="quickSearch('burger')">🍔 Burgers</button>
        <button type="button" onclick="quickSearch('sushi')">🍣 Sushi</button>
        <button type="button" onclick="quickSearch('tacos')">🌮 Tacos</button>
      </div>

      <div class="section-label">Mood</div>
      <div id="moods" class="moods">
        <button type="button" onclick="setMood('cheap')">💰 Cheap</button>
        <button type="button" onclick="setMood('date')">❤️ Date Night</button>
        <button type="button" onclick="setMood('fast')">⚡ Fast</button>
        <button type="button" onclick="setMood('healthy')">🥗 Healthy</button>
      </div>

      <div class="action-row">
        <button class="primary-btn" type="button" onclick="findFood()">Find Food</button>
        <button class="secondary-btn" type="button" onclick="whatShouldIEat()">🤖 What should I eat tonight?</button>
      </div>

      <div id="statusBar" class="status-bar">Ready</div>
    </section>

    <section class="results-panel">
      <div id="results">
        <div class="empty-state">
          <h2>Start with a craving</h2>
          <p>Type a food, choose a mood, or let the bot decide tonight’s best options.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
