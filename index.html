<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant AI Finder</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>

  <div class="app">

    <header class="header">
      <h1>🍽️ Restaurant AI Finder</h1>
      <p>Find the best food near you in seconds</p>
    </header>

    <div id="modeBar" class="mode-bar"></div>

    <div class="search-box">
      <input id="food" placeholder="What are you craving? (pizza, sushi...)" />
      <input id="location" placeholder="Location (city or 'near me')" />
      <button onclick="findFood()">Search</button>
    </div>

    <div id="statusBar" class="status"></div>

    <div id="results"></div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
