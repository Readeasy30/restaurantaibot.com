<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Restaurant AI Finder | Best Food Near You</title>

  <meta name="description" content="Find the best restaurants near you. AI-ranked food results, trending places, and local favorites." />

  <link rel="stylesheet" href="/css/style.css"/>
</head>

<body>

  <div class="app">

    <h1>🍽️ Restaurant AI Finder</h1>
    <p>Find the best food near you in seconds.</p>

    <div class="search-box">
      <input id="food" placeholder="What are you craving?" />
      <input id="location" placeholder="Location (or near me)" />
      <button onclick="findFood()">Search</button>
    </div>

    <div class="mode-bar" id="modeBar"></div>

    <div id="statusBar"></div>

    <div id="results"></div>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
